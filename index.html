<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollyn - Editor de Vídeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dpurple: '#7E22CE',
                        dlight: '#D8B4FE',
                        ddark: '#1E1B4B',
                    },
                    fontFamily: {
                        sans: ['"Kanit"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .border-pixel {
                border-style: solid;
                border-width: 4px;
                box-shadow: 6px 6px 0px rgba(0,0,0,0.3);
            }
            .glow {
                animation: glow 2s ease-in-out infinite alternate;
            }
            @keyframes glow {
                from { text-shadow: 0 0 10px #D8B4FE, 0 0 20px #7E22CE; }
                to { text-shadow: 0 0 20px #fff, 0 0 30px #D8B4FE, 0 0 40px #7E22CE; }
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-ddark via-purple-900 to-black text-white font-sans">

    <!-- CABEÇALHO -->
    <header class="min-h-screen flex flex-col items-center justify-center text-center p-6 relative">
        <div class="absolute w-72 h-72 bg-dpurple rounded-full blur-[100px] opacity-20"></div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold text-dlight glow mb-2">Dollyn</h1>
        <p class="text-xl md:text-2xl text-gray-300 font-light mb-10">Editor de Vídeos</p>
        
        <div class="bg-black/40 backdrop-blur-md p-8 border-pixel border-dpurple max-w-lg rounded-md">
            <p class="text-lg leading-relaxed">
                Especializado em <strong class="text-white">Minecraft</strong>, 
                <strong class="text-yellow-400">Pixelmon</strong> e Mods! 
                <br><br>
                Editando há <strong class="text-dlight">2 Anos</strong> 
                direto do <strong class="text-pink-400">CapCut</strong>.
            </p>
        </div>

        <div class="mt-12 animate-bounce">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-dlight" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        </div>
    </header>

    <!-- SEÇÃO: MEU TRABALHO (2 VÍDEOS 16:9) -->
    <section class="py-20 px-6 max-w-4xl mx-auto">
        <h2 class="text-4xl text-center font-bold text-dlight mb-16">Meu Trabalho</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <!-- VÍDEO 1 ✅ -->
            <div class="bg-black/40 backdrop-blur-md p-4 border-pixel border-dpurple rounded-md">
                <div class="aspect-video bg-black/60 mb-4 rounded overflow-hidden">
                    <iframe width="100%" height="100%" 
                        src="https://drive.google.com/file/d/1cjB3kFZgP-JqMdNSepiPhKsBrb3qiT8v/preview" 
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>
                </div>
                <h3 class="text-dlight text-xl font-bold">Pixelmon para Noah</h3>
            </div>

            <!-- VÍDEO 2 ✅ -->
            <div class="bg-black/40 backdrop-blur-md p-4 border-pixel border-dpurple rounded-md">
                <div class="aspect-video bg-black/60 mb-4 rounded overflow-hidden">
                    <iframe width="100%" height="100%" 
                        src="https://drive.google.com/file/d/1F9CPyFAgbuqotu573TZ3M0LWfp9X4Ptl/preview" 
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>
                </div>
                <h3 class="text-dlight text-xl font-bold">Pixelmon para Nice</h3>
            </div>

        </div>
    </section>

    <!-- SEÇÃO: EXEMPLOS DE SHORTS (2 VÍDEOS 9:16) -->
    <section class="py-10 px-6 max-w-3xl mx-auto">
        <h2 class="text-4xl text-center font-bold text-dlight mb-16">Exemplos de Shorts</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 justify-items-center">
            
            <!-- VÍDEO 3 ✅ -->
            <div class="bg-black/40 backdrop-blur-md p-4 border-pixel border-dpurple rounded-md w-72">
                <div class="aspect-[9/16] bg-black/60 mb-4 rounded overflow-hidden">
                    <iframe width="100%" height="100%" 
                        src="https://drive.google.com/file/d/1Vdx44kg6CILFPveEXiIkAj0mTbnN5_83/preview" 
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>
                </div>
                <h3 class="text-dlight text-xl font-bold text-center">Shorts para Vick</h3>
            </div>

            <!-- VÍDEO 4 ✅ -->
            <div class="bg-black/40 backdrop-blur-md p-4 border-pixel border-dpurple rounded-md w-72">
                <div class="aspect-[9/16] bg-black/60 mb-4 rounded overflow-hidden">
                    <iframe width="100%" height="100%" 
                        src="https://drive.google.com/file/d/1EmPWIxxVMtQH0aWQXZQft7OfWeGhom0N/preview" 
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>
                </div>
                <h3 class="text-dlight text-xl font-bold text-center">Shorts para Vick</h3>
            </div>

        </div>
    </section>

    <!-- SEÇÃO: CONTATO -->
    <section class="py-20 px-6 max-w-2xl mx-auto text-center">
        <h2 class="text-4xl font-bold text-dlight mb-10">Meios de Comunicação</h2>
        
        <div class="bg-black/40 backdrop-blur-md p-6 border-pixel border-dpurple rounded-md inline-flex items-center gap-4">
            <!-- ÍCONE DISCORD -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-dlight" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.27 5.33c-1.28-.58-2.64-1-4.06-1.18-.21.42-.45.83-.72 1.22-2.28-.34-4.56-.34-6.84 0-.27-.39-.51-.8-.72-1.22-1.42.18-2.78.6-4.06 1.18C1.79 7.12 1 9.16 1 11.3c0 2.56 1.49 4.83 3.78 5.84.29-.39.55-.8.78-1.22-1.41-.43-2.17-1.42-2.47-2.38.24-.1.47-.2.7-.3 2.32.64 4.68.64 7 0 .23.1.46.2.7.3-.3.96-1.06 1.95-2.47 2.38.23.42.49.83.78 1.22 2.29-1.01 3.78-3.28 3.78-5.84 0-2.14-.79-4.18-2.23-5.97zM8.94 13.69c-.88 0-1.6-.8-1.6-1.78 0-.99.72-1.79 1.6-1.79.89 0 1.61.8 1.61 1.79 0 .98-.72 1.78-1.61 1.78zm6.12 0c-.89 0-1.61-.8-1.61-1.78 0-.99.72-1.79 1.61-1.79.88 0 1.6.8 1.6 1.79 0 .98-.72 1.78-1.6 1.78z"/>
            </svg>
            <p class="text-xl">Discord: <span class="text-dlight font-semibold">dollyn_ylord</span></p>
        </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="bg-black/50 border-t-4 border-dpurple py-8 text-center">
        <p class="text-dlight">© 2026 Dollyn ✨</p>
    </footer>

</body>
</html>
